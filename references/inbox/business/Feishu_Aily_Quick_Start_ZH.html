-list=\"bullet1\" style=\"line-height: 1.6; margin-top: 0px; margin-bottom: 0px; padding-left: 0px; display: list-item; list-style-type: disc; text-align: left;\"\u003e接入工具与 API，实现复杂任务执行\u003c/li\u003e\u003c/ul\u003e\u003cul start=\"1\" style=\"margin: 0px; padding-left: 0px; list-style-position: inside;\"\u003e\u003cli class=\"temp-li bullet1\" data-line=\"true\" data-list=\"bullet1\" style=\"line-height: 1.6; margin-top: 0px; margin-bottom: 0px; padding-left: 0px; display: list-item; list-style-type: disc; text-align: left;\"\u003e配置工作规划体系，定义行为路径与边界\u003c/li\u003e\u003c/ul\u003e\u003cdiv data-zone-id=\"0\" data-line-index=\"29\" data-line=\"true\" style=\"white-space: pre-wrap;\"\u003e\u003ch3 class=\"heading-h3 lineguid-8mWCU\" style=\"text-align: left;\"\u003e工作流应用\u003c/h3\u003e\u003c/div\u003e\u003cdiv data-zone-id=\"0\" data-line-index=\"30\" data-line=\"true\" style=\"white-space: pre-wrap;\"\u003e如果业务的流程逻辑复杂、节点控制严格，如 AI 审批、AI 质检等，企业可以通过\u003ca href=\"https://aily.feishu.cn/hc/1u7kleqg/owh6kvac\" linkid=\"qJYIbQYgRd\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e工作流应用\u003c/a\u003e，以图形化形式搭建流程，低门槛实现业务自动化。\u003c/div\u003e\u003cdiv data-zone-id=\"0\" data-line-index=\"31\" data-line=\"true\" style=\"white-space: pre-wrap;\"\u003e工作流应用适合有如下特点的场景：\u003c/div\u003e\u003cul start=\"1\" style=\"margin: 0px; padding-left: 0px; list-style-position: inside;\"\u003e\u003cli class=\"temp-li bullet1\" data-line=\"true\" data-list=\"bullet1\" style=\"line-height: 1.6; margin-top: 0px; margin-bottom: 0px; padding-left: 0px; display: list-item; list-style-type: disc; text-align: left;\"\u003e多步骤判断与条件执行\u003c/li\u003e\u003c/ul\u003e\u003cul start=\"1\" style=\"margin: 0px; padding-left: 0px; list-style-position: inside;\"\u003e\u003cli class=\"temp-li bullet1\" data-line=\"true\" data-list=\"bullet1\" style=\"line-height: 1.6; margin-top: 0px; margin-bottom: 0px; padding-left: 0px; display: list-item; list-style-type: disc; text-align: left;\"\u003e多系统数据集成与响应\u003c/li\u003e\u003c/ul\u003e\u003cul start=\"1\" style=\"margin: 0px; padding-left: 0px; list-style-position: inside;\"\u003e\u003cli class=\"temp-li bullet1\" data-line=\"true\" data-list=\"bullet1\" style=\"line-height: 1.6; margin-top: 0px; margin-bottom: 0px; padding-left: 0px; display: list-item; list-style-type: disc; text-align: left;\"\u003e严格的流程治理\u003c/li\u003e\u003c/ul\u003e\u003cdiv data-zone-id=\"0\" data-line-index=\"35\" data-line=\"true\" style=\"white-space: pre-wrap;\"\u003e\u003cdiv style=\"text-align: center;\"\u003e\u003cimg src=\"https://p1-hera.feishucdn.com/tos-cn-i-jbbdkfciu3/08dd95cfe93c4c5db865b9a16790a66b~tplv-jbbdkfciu3-image:0:0.image\" image=\"true\" uuid=\"0ynW3LJ2\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv data-zone-id=\"0\" data-line-index=\"36\" data-line=\"true\" style=\"white-space: pre-wrap;\"\u003e\u003ch2 class=\"heading-h2 lineguid-iZeFX\" style=\"text-align: left;\"\u003e三、了解更多\u003c/h2\u003e\u003c/div\u003e\u003cdiv data-zone-id=\"0\" data-line-index=\"37\" data-line=\"true\" style=\"white-space: pre-wrap;\"\u003e\u003ca href=\"https://aily.feishu.cn/hc/1u7kleqg/taaiminh\" linkid=\"Ox0fI68NkF\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e飞书 aily 安全合规解决方案\u003c/a\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e","text":"一、简介\n*增值信息：超过每人每月免费额度后，更多 AI 额度需另外购买，具体信息请参考飞书 AI 用量购买说明。 \n内测信息：功能内测中。\n\n飞书 aily 提供专属个人的智能伙伴，开箱即用、安全可靠、专业高效，让你轻松上手、安心工作。\n此外，飞书 aily 还提供专业版、自定义智能体和工作流应用开发能力，让智能体融入业务，提供全新的 AI 生产力。\n注：本文仅包含飞书 aily 的概览信息，具体信息请参考飞书 aily 帮助文档。\n \n二、说明\n专属你的智能伙伴\n进入飞书 aily 页面，点击左侧智能伙伴下的 认领专属智能伙伴，即可激活你的智能伙伴。激活智能伙伴后，你可以在飞书中搜索到它，随时随地和它对话。\n智能伙伴深度集成飞书，可以成为你的智能办公助手：\n高效处理消息：碰到难以理解的消息，只需一键转发给智能伙伴，它会迅速为你分析解读；分析结束后，还能一键生成回复话术，帮你节省组织语言的时间。\n轻松搞定办公文档：不管是日常的日报、工作总结，还是正式的文档、PPT 制作，甚至是专业的数据报告，交给智能伙伴都能直接完成，让你摆脱繁琐的写作工作。\n重要事项实时监听：不仅可以主动监听关键人和关键群消息，确保重要事项不会遗漏，还可以主动整理昨日未读摘要与今日待办，每天早上准时推送给你。\n 个性化专属服务：支持一句话自定义名字、头像、说话风格；每日自动抽取工作记忆，沉淀为长期知识资产，从了解你的碎片信息到真正懂你。\n主动智能服务：定时执行任务、感知事件变化、主动触发服务，从被动执行升级为主动智能伙伴。\n技能自由扩展：内置丰富官方技能库，你可以自定义安装技能，也可以让智能伙伴自主发现、安装需要的技能，不断自我进化。\n企业级安全可信：权限体系与用户本人完全一致，AI 操作全程可追溯，敏感操作需人工确认，为你提供企业级安全稳定保障。\n \n飞书 aily 专业版\n进入 飞书 aily 专业版，你只需在对话框输入具体需求，即可轻松完成企业 AI 应用中的各类高频场景。无论是生成 PPT、撰写云文档、制作专业报告，还是搭建网页、创建数据仪表盘等，aily 专业版本都能高效完成，大幅提升你的办公效率。\n \n自定义智能体\n进入飞书 aily 页面，你可以点击 发现 页面，查看各类智能体，直接对话或一键创建同款。如果现有的智能体无法满足企业个性化需求，可以点击右上角 + 创建智能体，自定义配置专属提示词与业务知识库，打造贴合业务的专属智能体。\n \n自定义智能体支持以下个性化配置：\n自定义角色设定与提示词\n配置知识空间，接入结构化与非结构化内容\n接入工具与 API，实现复杂任务执行\n配置工作规划体系，定义行为路径与边界\n工作流应用\n如果业务的流程逻辑复杂、节点控制严格，如 AI 审批、AI 质检等，企业可以通过工作流应用，以图形化形式搭建流程，低门槛实现业务自动化。\n工作流应用适合有如下特点的场景：\n多步骤判断与条件执行\n多系统数据集成与响应\n严格的流程治理\n \n三、了解更多\n飞书 aily 安全合规解决方案\n"},"showVersionTemplateConfig":false,"tabName":"new Tab","tipsContent":"","tipsHighLights":[{"highLightColor":"#3370ff","highLightTarget":"_blank","highLightUrl":"https://applink.feishu.cn/client/web_url/open?width=640\u0026height=480\u0026mode=window\u0026url=https%3A%2F%2Flinkchat.feishu.cn%2Fim-linkchat%2Fredirect.html%3Fsource%3D5%26channelId%3D45","highLightWord":""}],"versionExtraConfigList":[]}],"LrYwMcGIYw":[],"MwtJhWBjrj":"快速了解飞书 aily","OjNAZvvQbi":"","WPPd2Oxz2G":"快速了解飞书 aily","_createTime":1758168325,"_env":"online","_i18nMap":{},"_lang":"zh-CN","_updateTime":1774515674,"fIB7z9Hb3M":[],"flebWvViiZ":"一、简介\n*增值信息：超过每人每月免费额度后，更多 AI 额度需另外购买，具体信息请参考飞书 AI 用量购买说明。 \n内测信息：功能内测中。\n\n飞书 aily 提供专属个人的智能伙伴，开箱即用、安全可靠、专业高效，让你轻松上手、安心工作。\n此外，飞书 aily 还提供专业版、自定义智能体和工作流应用","wIRqeL8DuD":"aily,Aily,智能体"};</script>
